name: Build and Deploy

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.title, '[BUILD]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Build static site
        working-directory: ./client
        env:
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
        run: pnpm build

      # Ship the exported `out/` folder to the VPS. `rm: true` wipes the
      # previous deploy first so pages removed since last build don't linger.
      - name: Upload static site to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "client/out/*"
          target: "~/app/out"
          strip_components: 2
          rm: true
          overwrite: true

      # Serve the static files with a tiny nginx container. Recreated on every
      # deploy so it always re-binds the freshly uploaded folder.
      - name: Serve on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            docker pull nginx:alpine
            docker rm -f louisplace 2>/dev/null || true
            docker run -d \
              --name louisplace \
              --restart always \
              -p 80:80 \
              -v "$HOME/app/out:/usr/share/nginx/html:ro" \
              nginx:alpine
            docker image prune -f
            echo "Deployment complete!"

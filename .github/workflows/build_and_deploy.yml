name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: ./client

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: client/package.json
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint_format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: client/package.json
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: client/package.json
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: client/package.json
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build (server runtime)
        env:
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
        run: pnpm build

  # Deploy only after lint, typecheck, test and build all pass, and only on a
  # push to main. Pull requests run everything above but never deploy.
  deploy:
    needs: [lint, typecheck, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ship the client source to the VPS so the image is built there.
      # `rm: true` wipes the previous copy so files removed since last deploy
      # don't linger in the build context.
      - name: Upload client source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "client/*"
          target: "~/app/src"
          strip_components: 1
          rm: true
          overwrite: true

      # Build the image on the VPS and run the Next.js server. The VPS runs a
      # native nginx reverse proxy on :80 (fronted by Cloudflare) that routes
      # app.louisplace.com -> 127.0.0.1:3000, so the container publishes on host
      # port 3000. The old container (and the legacy next_app / nginx-based
      # louisplace containers) are removed first, then recreated fresh.
      - name: Build and serve on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/app/src
            docker build -f dockerfile -t louisplace-client:latest .
            docker rm -f next_app 2>/dev/null || true
            docker rm -f louisplace 2>/dev/null || true
            docker run -d \
              --name louisplace \
              --restart always \
              -p 3000:3000 \
              louisplace-client:latest
            docker image prune -f
            echo "Deployment complete!"
